name: la_alameda
description: App de reservas para el Conjunto Residencial La Alameda
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase - backend, auth, realtime
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0

  # Local & secure storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Push notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Connectivity
  connectivity_plus: ^6.1.4

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  logger: ^2.5.0

  # Env config
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  json_serializable: ^6.9.5
  freezed: ^3.0.0
  freezed_annotation: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
