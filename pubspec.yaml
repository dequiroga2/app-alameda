name: la_alameda
description: App de reservas para el Conjunto Residencial La Alameda
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase - backend, auth, realtime
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0

  # Local & secure storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Local notifications (no requiere FCM ni Apple Developer)
  flutter_local_notifications: ^19.0.0

  # Connectivity
  connectivity_plus: ^6.1.4

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  logger: ^2.5.0

  # Env config
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  json_serializable: ^6.9.5
  freezed: ^3.0.0
  freezed_annotation: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  # Android adaptive icon (Android 8+): fondo teal sólido + logo encima
  adaptive_icon_background: "#0D6B72"
  adaptive_icon_foreground: "assets/images/logo.png"
  # iOS no usa adaptive icons — usa la imagen completa tal cual
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
